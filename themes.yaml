# Cafe Lumiere - テーマ設定

themes:
  - id: "coffee"
    title: "今日のコーヒー"
    prompt: "今日のおすすめコーヒー豆や抽出方法について話す。エチオピア豆のフルーティな風味など。"
    keywords: ["コーヒー", "豆", "抽出", "カフェ", "ラテ", "エスプレッソ"]

  - id: "weather"
    title: "今日の天気と気分"
    prompt: "今日の天気や季節の話題。外の景色やカフェの雰囲気と絡めて話す。"
    keywords: ["天気", "季節", "気分", "散歩", "空", "雨"]

  - id: "recommend"
    title: "最近のおすすめ"
    prompt: "Miaが最近気になっていること。本・映画・音楽など軽い雑談。"
    keywords: ["おすすめ", "本", "映画", "音楽", "最近", "気になる"]

  - id: "food"
    title: "おいしいものの話"
    prompt: "最近食べたおいしいものや季節の食材について話す。"
    keywords: ["食べ物", "おいしい", "料理", "スイーツ", "季節"]

  - id: "relax"
    title: "のんびり過ごす"
    prompt: "休日の過ごし方や、のんびりする方法について話す。カフェでのひとときも絡める。"
    keywords: ["のんびり", "休日", "リラックス", "ゆっくり", "休憩"]
